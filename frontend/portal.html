<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis – Start</title>
    <link rel="stylesheet" href="/static/css/theme.css?v=4">
    <link rel="icon" href="/static/favicon.png?v=6" type="image/png">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-body); background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
        .pt-topbar { display: flex; align-items: center; gap: 12px; padding: 12px 20px;
            border-bottom: 1px solid var(--border); background: var(--bg-glass); backdrop-filter: blur(8px); }
        .pt-logo { width: 34px; height: 34px; border-radius: 50%; background: var(--gradient);
            display: flex; align-items: center; justify-content: center; font-weight: 700; color: #fff;
            flex-shrink: 0; overflow: hidden; }
        .pt-title { font-size: 1.05rem; font-weight: 600; }
        .pt-spacer { flex: 1; }
        .pt-btn { background: none; border: 1px solid var(--border); color: var(--text-secondary);
            height: 34px; padding: 0 12px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
            display: flex; align-items: center; gap: 6px; font-family: var(--font-body); }
        .pt-btn:hover { border-color: var(--accent); color: var(--text-primary); }
        .pt-btn svg { width: 18px; height: 18px; }
        .hidden { display: none !important; }

        .pt-wrap { max-width: 880px; margin: 0 auto; padding: 48px 20px 60px; }
        .pt-hello { font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; }
        .pt-sub { color: var(--text-secondary); margin-bottom: 30px; }
        .pt-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 18px; }
        .pt-card { display: flex; flex-direction: column; gap: 10px; text-decoration: none;
            background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-lg);
            padding: 22px; box-shadow: var(--shadow-md); transition: transform .15s, border-color .15s; }
        .pt-card:hover { transform: translateY(-3px); border-color: rgba(var(--accent-rgb), .5); }
        .pt-card-icon { width: 46px; height: 46px; border-radius: 12px; display: flex; align-items: center;
            justify-content: center; background: rgba(var(--accent-rgb), .15); color: var(--accent-hover); }
        .pt-card-icon svg { width: 24px; height: 24px; }
        .pt-card-title { font-size: 1.1rem; font-weight: 600; color: var(--text-primary); }
        .pt-card-desc { font-size: 0.86rem; color: var(--text-secondary); line-height: 1.45; }
    </style>
</head>
<body>
<script>try{if(localStorage.getItem('jarvis_theme')==='light')document.body.classList.add('light');}catch(e){}</script>

<div class="pt-topbar">
    <div class="pt-logo topbar-avatar">J</div>
    <div class="pt-title brand-app-name">Jarvis</div>
    <div class="pt-spacer"></div>
    <button class="pt-btn" id="btn-theme-toggle" title="Hell/Dunkel umschalten" style="width:34px;padding:0;justify-content:center;">
        <svg class="theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="theme-icon-sun" style="display:none;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
    <button class="pt-btn" id="pt-logout" title="Abmelden">Abmelden</button>
</div>

<div class="pt-wrap">
    <div class="pt-hello">Willkommen<span id="pt-name"></span></div>
    <div class="pt-sub brand-app-name-sub">Wähle einen Bereich:</div>
    <div class="pt-cards">
        <a class="pt-card" href="/chat">
            <div class="pt-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
            <div class="pt-card-title">Chat</div>
            <div class="pt-card-desc">Mit dem Jarvis-Assistenten chatten.</div>
        </a>
        <a class="pt-card" href="/userchat">
            <div class="pt-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
            <div class="pt-card-title">Benutzer-Chat</div>
            <div class="pt-card-desc">Mit anderen Benutzern austauschen.</div>
        </a>
        <a class="pt-card hidden" id="pt-card-support" href="/support">
            <div class="pt-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><line x1="4.93" y1="4.93" x2="9.17" y2="9.17"/><line x1="14.83" y1="14.83" x2="19.07" y2="19.07"/><line x1="14.83" y1="9.17" x2="19.07" y2="4.93"/><line x1="4.93" y1="19.07" x2="9.17" y2="14.83"/></svg></div>
            <div class="pt-card-title">Support-Assistent</div>
            <div class="pt-card-desc">Antworten aus Wissen, Jira und Confluence.</div>
        </a>
        <a class="pt-card hidden" id="pt-card-admin" href="/">
            <div class="pt-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></div>
            <div class="pt-card-title">Hauptseite</div>
            <div class="pt-card-desc">Agent-Steuerung &amp; Verwaltung (Admin).</div>
        </a>
    </div>
</div>

<script src="/static/js/theme.js?v=2"></script>
<script src="/static/js/branding.js?v=9"></script>
<script>
(function () {
    var KEYS = ['jarvis_token', 'jarvis_chat_token', 'jarvis_uc_token'];
    function tok() { for (var i=0;i<KEYS.length;i++){var v=localStorage.getItem(KEYS[i]); if(v) return v;} return ''; }
    var t = tok();
    if (!t) { window.location.replace('/'); return; }
    var H = { 'Authorization': 'Bearer ' + t };

    fetch('/api/me', { headers: H }).then(function(r){ return r.ok ? r.json() : null; }).then(function(d){
        if (!d) return;
        if (d.username) { var n = document.getElementById('pt-name'); if (n) n.textContent = ', ' + d.username; }
        if (d.is_admin) { var a = document.getElementById('pt-card-admin'); if (a) a.classList.remove('hidden'); }
    }).catch(function(){});

    fetch('/api/support/status', { headers: H }).then(function(r){ return r.ok ? r.json() : null; }).then(function(d){
        if (d && d.active) { var c = document.getElementById('pt-card-support'); if (c) c.classList.remove('hidden'); }
    }).catch(function(){});

    var lo = document.getElementById('pt-logout');
    if (lo) lo.addEventListener('click', function(){ KEYS.forEach(function(k){localStorage.removeItem(k);}); window.location.replace('/'); });

    if (window.refreshBranding) try { window.refreshBranding(); } catch(e){}
})();
</script>
</body>
</html>
