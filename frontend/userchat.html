<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jarvis – Benutzer-Chat</title>
    <link rel="stylesheet" href="/static/css/chat.css?v=6">
    <link rel="icon" href="/static/favicon.png?v=6" type="image/png">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#7c3aed">
    <style>
        /* ─── User-Chat eigene Styles ──────────────────────────── */
        .uc-layout {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar – Userliste */
        .uc-sidebar {
            width: 240px;
            min-width: 200px;
            max-width: 300px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255,255,255,0.08);
            background: rgba(15,23,42,0.85);
            backdrop-filter: blur(12px);
        }

        .uc-sidebar-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary, #e2e8f0);
        }

        .uc-sidebar-header .back-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--accent, #7c3aed);
            padding: 4px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }
        .uc-sidebar-header .back-btn:hover { background: rgba(124,58,237,0.15); }
        .uc-sidebar-header .back-btn svg { width: 18px; height: 18px; }

        .uc-user-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .uc-user-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            cursor: pointer;
            transition: background 0.15s;
            border-radius: 0;
            position: relative;
        }
        .uc-user-item:hover { background: rgba(124,58,237,0.1); }
        .uc-user-item.active { background: rgba(124,58,237,0.18); }

        .uc-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            color: #fff;
            flex-shrink: 0;
            position: relative;
        }

        .uc-online-dot {
            position: absolute;
            bottom: 1px;
            right: 1px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 2px solid rgba(15,23,42,0.9);
        }
        .uc-online-dot.online  { background: #22c55e; }
        .uc-online-dot.offline { background: #64748b; }

        .uc-user-name {
            font-size: 0.88rem;
            color: var(--text-primary, #e2e8f0);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .uc-user-name.offline { color: var(--text-secondary, #94a3b8); }

        .uc-unread {
            margin-left: auto;
            background: #7c3aed;
            color: #fff;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 7px;
            min-width: 18px;
            text-align: center;
        }

        .uc-myself-badge {
            font-size: 0.65rem;
            color: #64748b;
            margin-left: auto;
        }

        /* Hauptbereich – Chat */
        .uc-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .uc-chat-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 18px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            background: rgba(15,23,42,0.7);
        }

        .uc-chat-header .uc-avatar { width: 32px; height: 32px; font-size: 0.8rem; }

        .uc-chat-title {
            font-size: 0.92rem;
            font-weight: 600;
            color: var(--text-primary, #e2e8f0);
        }
        .uc-chat-status {
            font-size: 0.72rem;
            color: #64748b;
            margin-left: 2px;
        }
        .uc-chat-status.online { color: #22c55e; }

        .uc-empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #475569;
            gap: 12px;
            font-size: 0.92rem;
        }
        .uc-empty-state svg { opacity: 0.4; }

        /* Nachrichten */
        .uc-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .uc-msg-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }
        .uc-msg-row.mine { flex-direction: row-reverse; }

        .uc-bubble {
            max-width: 70%;
            padding: 8px 14px;
            border-radius: 18px;
            font-size: 0.9rem;
            line-height: 1.45;
            word-break: break-word;
        }
        .uc-bubble.theirs {
            background: rgba(30,41,59,0.85);
            border-bottom-left-radius: 4px;
            color: var(--text-primary, #e2e8f0);
        }
        .uc-bubble.mine {
            background: rgba(99,102,241,0.3);
            border-bottom-right-radius: 4px;
            color: var(--text-primary, #e2e8f0);
        }

        .uc-ts {
            font-size: 0.67rem;
            color: #475569;
            margin-bottom: 2px;
            padding: 0 2px;
        }

        .uc-date-sep {
            text-align: center;
            font-size: 0.72rem;
            color: #475569;
            margin: 12px 0 6px;
        }

        .uc-typing {
            font-size: 0.75rem;
            color: #64748b;
            padding: 4px 16px;
            min-height: 20px;
        }

        /* Eingabe */
        .uc-input-bar {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            padding: 10px 14px;
            border-top: 1px solid rgba(255,255,255,0.08);
            background: rgba(15,23,42,0.7);
        }

        .uc-input {
            flex: 1;
            background: rgba(30,41,59,0.7);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 10px 16px;
            color: var(--text-primary, #e2e8f0);
            font-size: 0.9rem;
            resize: none;
            min-height: 40px;
            max-height: 120px;
            outline: none;
            font-family: inherit;
            line-height: 1.4;
        }
        .uc-input:focus { border-color: rgba(124,58,237,0.4); }
        .uc-input::placeholder { color: #475569; }

        .uc-send-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #7c3aed;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            flex-shrink: 0;
            transition: background 0.15s, transform 0.1s;
        }
        .uc-send-btn:hover:not(:disabled) { background: #6d28d9; transform: scale(1.05); }
        .uc-send-btn:disabled { background: #334155; cursor: not-allowed; transform: none; }
        .uc-send-btn svg { width: 18px; height: 18px; }

        /* Kein Chat gewählt */
        .uc-no-chat { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; color: #475569; gap: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen" class="login-screen">
    <div class="login-card">
        <div class="login-avatar">J</div>
        <h1 class="login-title">Jarvis</h1>
        <p class="login-subtitle">Benutzer-Chat</p>
        <form id="login-form" autocomplete="off">
            <input type="text" id="login-user" placeholder="Benutzername" autocomplete="username" required>
            <div class="password-wrap">
                <input type="password" id="login-pass" placeholder="Kennwort" autocomplete="current-password" required>
                <button type="button" class="eye-btn" id="eye-btn" tabindex="-1">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </button>
            </div>
            <div id="totp-row" class="totp-row hidden">
                <input type="text" id="login-totp" placeholder="6-stelliger Code" autocomplete="one-time-code"
                       inputmode="numeric" pattern="[0-9]*" maxlength="6">
            </div>
            <button type="submit" class="btn-login" id="btn-login">Anmelden</button>
            <p class="login-error" id="login-error"></p>
        </form>
    </div>
</div>

<!-- Chat Screen -->
<div id="chat-screen" class="hidden" style="display:none;height:100vh;">
    <div class="uc-layout">

        <!-- Sidebar: Userliste -->
        <div class="uc-sidebar">
            <div class="uc-sidebar-header">
                <a href="/chat" class="back-btn" title="Zurück zu Jarvis">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"/>
                    </svg>
                </a>
                <span>Benutzer-Chat</span>
                <span id="uc-own-badge" class="uc-myself-badge"></span>
            </div>
            <div class="uc-user-list" id="uc-user-list">
                <!-- wird per JS befüllt -->
            </div>
        </div>

        <!-- Hauptbereich -->
        <div class="uc-main">
            <!-- Kein Chat gewählt -->
            <div class="uc-empty-state" id="uc-empty-state">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                </svg>
                <span>Wähle einen Benutzer links aus</span>
            </div>

            <!-- Aktiver Chat -->
            <div id="uc-chat-area" style="display:none;flex:1;flex-direction:column;overflow:hidden;" class="uc-main">
                <div class="uc-chat-header" id="uc-chat-header">
                    <div class="uc-avatar" id="uc-partner-avatar">?</div>
                    <div>
                        <div class="uc-chat-title" id="uc-partner-name">–</div>
                        <div class="uc-chat-status" id="uc-partner-status">offline</div>
                    </div>
                    <button id="btn-uc-logout" title="Abmelden" style="margin-left:auto;background:none;border:none;cursor:pointer;color:#64748b;font-size:1.2rem;padding:4px 8px;" onclick="location.reload()">⏻</button>
                </div>
                <div class="uc-messages" id="uc-messages"></div>
                <div class="uc-typing" id="uc-typing"></div>
                <div class="uc-input-bar">
                    <textarea class="uc-input" id="uc-input" placeholder="Nachricht schreiben…" rows="1"></textarea>
                    <button class="uc-send-btn" id="uc-send-btn" title="Senden">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"/>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="/static/js/userchat.js?v=1"></script>
</body>
</html>
